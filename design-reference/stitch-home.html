<header class="sticky top-0 w-full z-50 flex justify-between items-center px-margin-page h-16 bg-surface shadow-sm">

<button class="active:scale-[0.98] transition-all duration-200 ease-in-out hover:bg-surface-container-high p-2 rounded-full">

</button>
<h1 class="text-h2 font-bold text-on-surface">作业备忘录</h1>
</div>
</header>
<main class="pb-16">

<span class="text-h2 font-bold mt-1">22</span>
</div>

<span class="text-h2 font-bold mt-1">23</span>

<span class="text-h2 font-bold mt-1">24</span>

</div>

<span class="text-h2 font-bold mt-1">26</span>
</div>
<div class="flex flex-col items-center min-w-[56px] py-3 rounded-2xl bg-surface-container-low text-on-surface-variant active:scale-95 transition-all">

<span class="text-h2 font-bold mt-1">27</span>

</div>
